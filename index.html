<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0f1d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Corps 3D" />
<title>Corps humain 3D — Atlas anatomique complet</title>
<style>
  :root { --panel:rgba(13,19,33,0.86); --accent:#f59e42; --accent-2:#ff7a45;
    --text:#eef2f8; --muted:#9aa7bd; --border:rgba(148,163,184,0.16);
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
    --sal:env(safe-area-inset-left,0px); --sar:env(safe-area-inset-right,0px); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none;position:fixed;inset:0;
    -webkit-text-size-adjust:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0a0f1d;color:var(--text); }
  #app { position:fixed; inset:0; } canvas { display:block; touch-action:none; }
  #vignette { position:absolute; inset:0; pointer-events:none; z-index:5; box-shadow:inset 0 0 220px 40px rgba(0,0,0,0.55); }
  .glass { background:var(--panel); border:1px solid var(--border); border-radius:16px;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:0 14px 46px rgba(0,0,0,0.5); }

  #title { position:absolute; top:calc(var(--sat) + 14px); left:calc(var(--sal) + 16px); z-index:10;
    pointer-events:none; text-shadow:0 2px 14px rgba(0,0,0,0.7); }
  #title h1 { margin:0; font-size:18px; font-weight:750; }
  #title p { margin:3px 0 0; font-size:11.5px; color:var(--muted); }

  .topbar { position:absolute; left:50%; transform:translateX(-50%); z-index:15; display:flex; gap:5px;
    padding:5px; border-radius:999px; max-width:calc(100vw - 20px); flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; }
  .topbar::-webkit-scrollbar { display:none; }
  #layers { top:14px; }
  #regionbar { top:60px; }
  .chip { cursor:pointer; border:0; background:transparent; color:var(--muted); padding:8px 13px;
    border-radius:999px; font-size:12.5px; font-weight:650; white-space:nowrap; transition:.12s; }
  .chip.on { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#1a1207; }
  .chip.loading { opacity:.55; }
  .chip.allbtn { background:rgba(148,163,184,0.16); color:var(--text); }

  #toast { position:absolute; top:104px; left:50%; transform:translateX(-50%) translateY(-8px); opacity:0;
    transition:.2s; z-index:25; padding:9px 16px; border-radius:999px; font-size:13px; pointer-events:none; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  #list-toggle { display:none; position:absolute; top:calc(var(--sat) + 12px); right:calc(var(--sar) + 12px);
    z-index:16; align-items:center; gap:6px; cursor:pointer; border:0; color:var(--text);
    padding:9px 14px; border-radius:999px; font-size:13.5px; font-weight:650; }

  #info { position:absolute; top:108px; right:18px; z-index:13; width:330px; max-width:calc(100vw - 36px); padding:18px 18px 16px; }
  #info .badge { display:inline-block; font-size:10.5px; text-transform:uppercase; letter-spacing:1px; color:var(--accent); font-weight:800; margin-bottom:7px; }
  #info h2 { margin:0 0 3px; font-size:18px; line-height:1.25; padding-right:30px; }
  #info .latin { font-style:italic; color:#b6c2d6; font-size:13px; margin-bottom:11px; }
  #info .tags { margin-bottom:6px; }
  #info .tag { display:inline-block; font-size:11px; color:var(--muted); border:1px solid var(--border); border-radius:999px; padding:2px 9px; margin:0 5px 5px 0; }
  #info .role-label { font-size:10.5px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:8px 0 4px; }
  #info .role { font-size:13.5px; line-height:1.5; }
  #info .hint { font-size:12.5px; color:var(--muted); line-height:1.55; }
  #info-close { display:none; position:absolute; top:12px; right:12px; width:30px; height:30px; align-items:center; justify-content:center;
    border:0; border-radius:50%; cursor:pointer; background:rgba(148,163,184,.16); color:var(--text); font-size:17px; }

  #list { position:absolute; left:18px; top:108px; bottom:78px; z-index:30; width:264px; overflow-y:auto; padding:8px; -webkit-overflow-scrolling:touch; }
  #list-head { display:none; align-items:center; justify-content:space-between; padding:2px 4px 10px; }
  #list-head b { font-size:15px; }
  #list-close { width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:0;border-radius:50%;cursor:pointer;background:rgba(148,163,184,.16);color:var(--text);font-size:18px; }
  #search { width:100%; margin:2px 0 6px; padding:11px 13px; font-size:16px; color:var(--text); background:rgba(148,163,184,0.10); border:1px solid var(--border); border-radius:10px; outline:none; }
  #search:focus { border-color:var(--accent); }
  .lyr-h { display:flex; align-items:center; gap:8px; padding:13px 6px 5px; }
  .lyr-h .t { font-size:12px; text-transform:uppercase; letter-spacing:1px; font-weight:800; color:var(--accent); flex:1; }
  .lyr-h input[type=range] { width:74px; accent-color:var(--accent); }
  .reg-h { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); padding:8px 6px 3px; font-weight:700; }
  .mbtn { display:flex; align-items:center; gap:9px; width:100%; text-align:left; cursor:pointer; background:transparent; border:0; color:var(--text); padding:8px; border-radius:9px; font-size:13px; transition:background .12s; }
  .mbtn:active,.mbtn:hover { background:rgba(148,163,184,0.14); }
  .mbtn.active { background:linear-gradient(90deg,rgba(245,158,66,.22),rgba(245,158,66,.05)); }
  .mbtn .dot { width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,0.07); }
  .mbtn .nm { line-height:1.15; }
  .mbtn .lt { display:block; font-size:10.5px; font-style:italic; color:var(--muted); }
  .more { font-size:11.5px; color:var(--muted); padding:6px 8px; font-style:italic; }
  #list::-webkit-scrollbar { width:8px; } #list::-webkit-scrollbar-thumb { background:rgba(148,163,184,0.28); border-radius:8px; }

  #controls { position:absolute; left:50%; bottom:calc(var(--sab) + 16px); transform:translateX(-50%); z-index:12;
    display:flex; gap:7px; padding:7px 9px; border-radius:999px; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; max-width:calc(100vw - 20px); }
  #controls::-webkit-scrollbar { display:none; }
  .ctl { cursor:pointer; border:0; color:var(--text); background:rgba(148,163,184,0.12); border-radius:999px; padding:9px 14px; font-size:13px; font-weight:650; white-space:nowrap; flex:0 0 auto; transition:.12s; }
  .ctl:active,.ctl:hover { background:rgba(148,163,184,0.26); }
  .ctl.on { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#1a1207; }

  #loading { position:absolute; inset:0; z-index:40; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:#0a0f1d; color:var(--muted); font-size:14px; text-align:center; padding:24px; }
  .spinner { width:38px;height:38px;border-radius:50%;border:3px solid rgba(148,163,184,0.22);border-top-color:var(--accent);animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #bar { width:min(240px,70vw); height:6px; background:rgba(148,163,184,.18); border-radius:999px; overflow:hidden; }
  #bar>div { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .2s; }
  #loading .err { color:#fca5a5; max-width:520px; line-height:1.55; }
  #loading .err code { background:rgba(255,255,255,.08); padding:2px 6px; border-radius:5px; font-size:12px; }

  @media (max-width:900px), (pointer:coarse) {
    #title h1 { font-size:15px; } #title p { display:none; }
    #list-toggle { display:flex; }
    #layers { top:calc(var(--sat) + 50px); }
    #regionbar { top:calc(var(--sat) + 92px); }
    #toast { top:calc(var(--sat) + 134px); }
    #info { top:auto; left:8px; right:8px; width:auto; max-width:none; bottom:calc(var(--sab) + 72px);
      transform:translateY(160%); transition:transform .34s cubic-bezier(.32,.72,0,1); max-height:44vh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-top:18px; }
    #info.open { transform:translateY(0); } #info-close { display:flex; } #info .badge { display:none; }
    #list { top:auto; left:0; right:0; bottom:0; width:auto; border-radius:22px 22px 0 0; max-height:82vh;
      transform:translateY(102%); transition:transform .34s cubic-bezier(.32,.72,0,1); padding:10px 14px calc(var(--sab) + 14px); z-index:30; }
    #list.open { transform:translateY(0); }
    #list::before { content:""; display:block; width:42px; height:5px; border-radius:999px; background:rgba(148,163,184,.4); margin:2px auto 8px; }
    #list-head { display:flex; } .mbtn { padding:11px 8px; font-size:14px; }
    #controls { bottom:calc(var(--sab) + 12px); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="loading"><div class="spinner"></div><div id="load-msg">Chargement du modèle…</div><div id="bar"><div></div></div></div>
  <div id="vignette"></div>
  <div id="title"><h1>🫀 Corps humain 3D</h1><p>Tourne · 2 doigts pour déplacer · double-tap pour cadrer</p></div>

  <div id="layers" class="topbar glass"></div>
  <div id="regionbar" class="topbar glass"></div>
  <div id="toast" class="glass"></div>
  <button id="list-toggle" class="glass">☰ Liste</button>

  <div id="info" class="glass">
    <button id="info-close" aria-label="Fermer">✕</button>
    <span class="badge">Atlas anatomique</span>
    <div id="info-body"><p class="hint">Active des systèmes en haut, filtre par région, ou cherche dans la liste.
      Touche une structure pour voir son nom et son nom scientifique.</p></div>
  </div>

  <div id="list" class="glass">
    <div id="list-head"><b>Anatomie</b><button id="list-close" aria-label="Fermer">✕</button></div>
    <input id="search" type="text" placeholder="Rechercher dans tout le corps…" autocomplete="off" />
    <div id="list-items"></div>
  </div>

  <div id="controls" class="glass">
    <button class="ctl" id="btn-focus">🎯 Cadrer</button>
    <button class="ctl" id="btn-rotate">⟳ Rotation</button>
    <button class="ctl" id="btn-front">Avant</button>
    <button class="ctl" id="btn-back">Arrière</button>
    <button class="ctl" id="btn-reset">⤢ Recentrer</button>
  </div>
</div>

<script type="importmap">
{ "imports": { "three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
const loadMsg=(h)=>{const e=document.getElementById('load-msg'); if(e)e.innerHTML=h;};
const fail=(m)=>{const l=document.getElementById('loading'); if(l)l.innerHTML=`<div class="err"><b>Impossible d'afficher la 3D.</b><br>${m}</div>`;};
window.addEventListener('error',(e)=>fail(e.message||'Erreur inconnue.'));
const MOBILE = window.matchMedia('(pointer: coarse)').matches || innerWidth<900;
let THREE;
function jitterColor(hex,key,amp){ let h=0; for(const c of key) h=(h*31+c.charCodeAt(0))&0xffff;
  const col=new THREE.Color(hex); const hsl={}; col.getHSL(hsl);
  hsl.l=Math.min(0.82,Math.max(0.26, hsl.l+((h%100)/100-0.5)*amp)); hsl.h=(hsl.h+((h%70)/70-0.5)*0.01+1)%1;
  return new THREE.Color().setHSL(hsl.h,hsl.s,hsl.l); }

try {
THREE = await import('three');
const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
const { RoomEnvironment } = await import('three/addons/environments/RoomEnvironment.js');
const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');
const { DRACOLoader } = await import('three/addons/loaders/DRACOLoader.js');

const sysd = await fetch('systems.json').then(r=>r.json());
const ALL = sysd.data;
const REGORDER = sysd.regionOrder || ['Tête','Cou','Thorax','Membre supérieur','Main','Abdomen','Bassin','Cuisse','Jambe','Pied'];
const LAYERS = sysd.layers.map((L,i)=>({...L, visible:i===0, loaded:false, group:null, opacity:1}));
const layerByKey={}; for(const L of LAYERS) layerByKey[L.key]=L;
function colorFor(id){ const e=ALL[id]; const L=layerByKey[e.layer]; return jitterColor(L.base||'#b03a2e', id, L.key==='skeletal'?0.05:0.12); }

/* ---- scène ---- */
const app=document.getElementById('app'); const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 200);
const renderer=new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=!MOBILE; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
renderer.domElement.style.touchAction='none'; app.appendChild(renderer.domElement);
const pmrem=new THREE.PMREMGenerator(renderer); scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
scene.add(new THREE.Mesh(new THREE.SphereGeometry(80,32,32),
  new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,
    uniforms:{top:{value:new THREE.Color('#1d2c4d')},bot:{value:new THREE.Color('#080c17')}},
    vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vP;uniform vec3 top;uniform vec3 bot;void main(){float h=clamp(normalize(vP).y*0.5+0.5,0.0,1.0);gl_FragColor=vec4(mix(bot,top,pow(h,1.3)),1.0);}`})));
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true; controls.dampingFactor=0.09;
controls.minDistance=1.2; controls.maxDistance=40; controls.rotateSpeed=MOBILE?0.7:1.0;
controls.enablePan=true; controls.screenSpacePanning=true; controls.panSpeed=MOBILE?1.0:0.85; controls.keyPanSpeed=18;
controls.touches={ONE:THREE.TOUCH.ROTATE,TWO:THREE.TOUCH.DOLLY_PAN};
controls.listenToKeyEvents(window);  // flèches = déplacement
scene.add(new THREE.HemisphereLight(0xdfeaff,0x141422,MOBILE?0.5:0.4));
const key=new THREE.DirectionalLight(0xfff2e6,1.7); key.position.set(6,12,8); key.castShadow=!MOBILE;
if(!MOBILE){key.shadow.mapSize.set(2048,2048); key.shadow.bias=-0.0004; Object.assign(key.shadow.camera,{near:1,far:60,left:-9,right:9,top:17,bottom:-5});}
scene.add(key);
const rim=new THREE.DirectionalLight(0x6f9bff,0.7); rim.position.set(-7,5,-6); scene.add(rim);
const ring=new THREE.Mesh(new THREE.RingGeometry(2.9,2.96,80), new THREE.MeshBasicMaterial({color:0x3a4a66,side:THREE.DoubleSide}));
ring.rotation.x=-Math.PI/2; ring.position.y=-0.05; scene.add(ring);

let composer=null, outline=null;
if(!MOBILE){
  const {EffectComposer}=await import('three/addons/postprocessing/EffectComposer.js');
  const {RenderPass}=await import('three/addons/postprocessing/RenderPass.js');
  const {OutlinePass}=await import('three/addons/postprocessing/OutlinePass.js');
  const {OutputPass}=await import('three/addons/postprocessing/OutputPass.js');
  composer=new EffectComposer(renderer); composer.addPass(new RenderPass(scene,camera));
  outline=new OutlinePass(new THREE.Vector2(innerWidth,innerHeight),scene,camera);
  outline.edgeStrength=6; outline.edgeGlow=0.5; outline.edgeThickness=1.3; outline.visibleEdgeColor.set('#ffc37a'); outline.hiddenEdgeColor.set('#9a4e1c');
  composer.addPass(outline); composer.addPass(new OutputPass());
}
function renderFrame(){ composer?composer.render():renderer.render(scene,camera); }

/* ---- rig + chargement ---- */
const rig=new THREE.Group(); rig.rotation.x=-Math.PI/2; scene.add(rig);
let rigReady=false, modelH=7;
const meshesById={}; const pickables=[];
const draco=new DRACOLoader(); draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/');
const loader=new GLTFLoader(); loader.setDRACOLoader(draco);

function makeMat(L,color){
  if(L.key==='skeletal') return new THREE.MeshPhysicalMaterial({color,roughness:0.62,metalness:0,sheen:0.25,sheenColor:new THREE.Color(0xffffff),envMapIntensity:0.75,emissive:color.clone(),emissiveIntensity:0,transparent:true,opacity:1});
  return new THREE.MeshPhysicalMaterial({color,roughness:0.5,metalness:0,clearcoat:MOBILE?0:0.15,clearcoatRoughness:0.5,sheen:0.5,sheenColor:new THREE.Color(0xffd9c2),sheenRoughness:0.7,envMapIntensity:0.85,emissive:color.clone(),emissiveIntensity:0,transparent:true,opacity:1});
}
function fitRig(object){
  rig.scale.setScalar(1); rig.position.set(0,0,0); rig.updateMatrixWorld(true);
  let b=new THREE.Box3().setFromObject(object); const sz=b.getSize(new THREE.Vector3());
  const s=7/sz.y; rig.scale.setScalar(s); rig.updateMatrixWorld(true);
  b=new THREE.Box3().setFromObject(object); const c=b.getCenter(new THREE.Vector3());
  rig.position.x-=c.x; rig.position.z-=c.z; rig.position.y-=b.min.y; rig.updateMatrixWorld(true);
  modelH=sz.y*s; rigReady=true;
}
function buildLayerMeshes(L,root){
  root.visible=L.visible;
  root.traverse(o=>{ if(!o.isMesh) return; const id=(o.name||'').split('__')[0]; if(!ALL[id]) return;
    o.geometry.computeVertexNormals(); const col=colorFor(id);
    o.material=makeMat(L,col); o.userData.baseEmissive=o.material.emissive.clone(); o.userData.id=id; o.castShadow=!MOBILE;
    (meshesById[id]=meshesById[id]||[]).push(o); });
}
async function ensureLayer(L){
  if(L.loaded) return; const first=!rigReady; let gltf;
  try{ gltf=await loader.loadAsync(L.file,(ev)=>{ if(first&&ev.total){const p=Math.round(ev.loaded/ev.total*100);
    const bd=document.querySelector('#bar>div'); if(bd)bd.style.width=p+'%'; loadMsg(`Chargement du modèle… ${p}%`);} }); }
  catch(e){ if(first) fail(location.protocol==='file:'
    ? `<code>${L.file}</code> illisible en local (file://).<br>➜ <code>python3 -m http.server</code> puis http://localhost:8000`
    : `<code>${L.file}</code> introuvable.`); throw e; }
  L.loaded=true; L.group=gltf.scene; rig.add(gltf.scene);
  if(first) fitRig(gltf.scene);
  buildLayerMeshes(L,gltf.scene);
}

/* ---- filtres / visibilité ---- */
let activeRegion=null, xray=false;
function applyFilter(){
  for(const id in meshesById){ const ok=!activeRegion || ALL[id].reg===activeRegion;
    for(const m of meshesById[id]) m.visible=ok; }
  for(const L of LAYERS) if(L.group) L.group.visible=L.visible;
  updatePickables();
}
function updatePickables(){ pickables.length=0;
  for(const id in meshesById){ const L=layerByKey[ALL[id].layer]; if(!L.visible) continue;
    if(activeRegion && ALL[id].reg!==activeRegion) continue; pickables.push(...meshesById[id]); } }

/* ---- interaction + surbrillance ---- */
const raycaster=new THREE.Raycaster(); const pointer=new THREE.Vector2();
let hoveredId=null, selectedId=null; const HL=new THREE.Color('#ffd27a');
function refresh(){
  for(const id in meshesById){ const L=layerByKey[ALL[id].layer]; const sel=id===selectedId, hov=id===hoveredId;
    for(const m of meshesById[id]){
      if(sel){ m.material.emissive.copy(HL); m.material.emissiveIntensity=0.95; }
      else { m.material.emissive.copy(m.userData.baseEmissive); m.material.emissiveIntensity=hov?0.34:0.0; }
      let op = sel?1.0 : (xray ? (hov?L.opacity:Math.min(L.opacity,0.16)) : L.opacity);
      m.material.opacity=op; m.material.transparent=op<0.999; m.material.depthWrite=op>=0.999;
    } }
  if(outline) outline.selectedObjects = selectedId&&meshesById[selectedId] ? meshesById[selectedId] : [];
}
function pickAt(cx,cy){ pointer.x=(cx/innerWidth)*2-1; pointer.y=-(cy/innerHeight)*2+1;
  raycaster.setFromCamera(pointer,camera); const h=raycaster.intersectObjects(pickables,false); return h.length?h[0].object.userData.id:null; }

/* ---- vol fluide vers une structure (cadrage) ---- */
let fly=null;
function flyTo(center,size){
  const maxd=Math.max(size.x,size.y,size.z,0.25);
  const dist=Math.min(34,Math.max(1.6, maxd/(2*Math.tan(THREE.MathUtils.degToRad(camera.fov/2)))*1.7));
  const dir=new THREE.Vector3().subVectors(camera.position,controls.target);
  if(dir.lengthSq()<1e-6) dir.set(0,0,1); dir.normalize();
  fly={t0:performance.now(),dur:650,fromP:camera.position.clone(),toP:center.clone().add(dir.multiplyScalar(dist)),
       fromT:controls.target.clone(),toT:center.clone()};
}
function focusId(id){ if(!id||!meshesById[id]) return; const box=new THREE.Box3();
  for(const m of meshesById[id]){ if(m.visible) box.expandByObject(m); }
  if(box.isEmpty()) return; flyTo(box.getCenter(new THREE.Vector3()), box.getSize(new THREE.Vector3())); }
if(!MOBILE) renderer.domElement.addEventListener('pointermove',(e)=>{ const id=pickAt(e.clientX,e.clientY);
  if(id!==hoveredId){hoveredId=id; refresh(); renderer.domElement.style.cursor=id?'pointer':'grab';} });
let dx=0,dy=0,moved=false; const TAP=MOBILE?11:5; let lastTap=0,lastTapId=null;
renderer.domElement.addEventListener('pointerdown',(e)=>{dx=e.clientX;dy=e.clientY;moved=false; fly=null;});
renderer.domElement.addEventListener('pointermove',(e)=>{ if(Math.hypot(e.clientX-dx,e.clientY-dy)>TAP) moved=true; });
renderer.domElement.addEventListener('pointerup',(e)=>{ if(moved) return;
  const id=pickAt(e.clientX,e.clientY); const now=performance.now();
  if(id && id===lastTapId && now-lastTap<320){ select(id); focusId(id); }   // double-tap → cadrer
  else select(id);
  lastTap=now; lastTapId=id;
});
renderer.domElement.addEventListener('dblclick',(e)=>{ const id=pickAt(e.clientX,e.clientY); if(id){ select(id); focusId(id); } });

const infoEl=document.getElementById('info'), listEl=document.getElementById('list');
function select(id){ selectedId=id; refresh(); updateInfo(id); markList(id);
  if(MOBILE){ if(id){infoEl.classList.add('open'); listEl.classList.remove('open');} else infoEl.classList.remove('open'); } }

/* ---- UI : info ---- */
const infoBody=document.getElementById('info-body');
function updateInfo(id){ const m=id&&ALL[id];
  if(!m){ infoBody.innerHTML=`<p class="hint">Touche une structure pour afficher son nom et son nom scientifique.</p>`; return; }
  infoBody.innerHTML=`<h2>${m.fr}</h2><div class="latin">${m.la}</div>
    <div class="tags"><span class="tag">${layerByKey[m.layer].label}</span><span class="tag">${m.reg}</span></div>`;
}

/* ---- UI : barres de filtres ---- */
const layersEl=document.getElementById('layers');
const allBtn=document.createElement('button'); allBtn.className='chip allbtn'; allBtn.textContent='✦ Tout';
allBtn.addEventListener('click',toggleAll); layersEl.appendChild(allBtn);
const layerBtns={};
for(const L of LAYERS){ const b=document.createElement('button'); b.className='chip'+(L.visible?' on':''); b.textContent=L.label;
  b.addEventListener('click',()=>toggleLayer(L,b)); layersEl.appendChild(b); layerBtns[L.key]=b; }

const regionEl=document.getElementById('regionbar');
function mkRegionChip(label,val){ const b=document.createElement('button'); b.className='chip'+(activeRegion===val?' on':'');
  b.textContent=label; b.dataset.region=val===null?'':val; b.addEventListener('click',()=>setRegion(val)); return b; }
regionEl.appendChild(mkRegionChip('Tout le corps',null));
for(const r of REGORDER) regionEl.appendChild(mkRegionChip(r,r));
function setRegion(val){ activeRegion=val;
  regionEl.querySelectorAll('.chip').forEach(c=>{ const cv=c.dataset.region===''?null:c.dataset.region; c.classList.toggle('on',cv===val); });
  applyFilter(); refresh(); buildList(document.getElementById('search').value);
}

async function toggleLayer(L,btn){ const on=!L.visible;
  if(on && !L.loaded){ btn.classList.add('loading'); showToast(`Chargement : ${L.label}…`);
    try{ await ensureLayer(L); }catch{ btn.classList.remove('loading'); showToast('Échec.'); setTimeout(hideToast,1500); return; }
    btn.classList.remove('loading'); hideToast(); }
  L.visible=on; if(L.group) L.group.visible=on; btn.classList.toggle('on',on);
  if(selectedId && !layerByKey[ALL[selectedId].layer].visible) select(null);
  applyFilter(); refresh(); buildList(document.getElementById('search').value);
}
let allOn=false;
async function toggleAll(){ allOn=!allOn; allBtn.classList.toggle('on',allOn);
  if(allOn){ showToast('Chargement de tous les systèmes…');
    for(const L of LAYERS){ if(!L.loaded){ try{ await ensureLayer(L); }catch{} } L.visible=true; if(L.group)L.group.visible=true; layerBtns[L.key].classList.add('on'); }
    hideToast(); }
  else { for(const L of LAYERS){ L.visible=(L.key==='muscular'); if(L.group)L.group.visible=L.visible; layerBtns[L.key].classList.toggle('on',L.visible); } }
  applyFilter(); refresh(); buildList(document.getElementById('search').value);
}

/* ---- UI : liste (groupée + recherche globale) ---- */
const listItems=document.getElementById('list-items'); const CAP=240;
function mkItem(id){ const m=ALL[id]; const col='#'+colorFor(id).getHexString();
  const b=document.createElement('button'); b.className='mbtn'+(id===selectedId?' active':''); b.dataset.id=id;
  b.innerHTML=`<span class="dot" style="background:${col}"></span><span class="nm">${m.fr}<span class="lt">${m.la}</span></span>`;
  b.addEventListener('click',()=>onItemClick(id));
  if(!MOBILE){ b.addEventListener('mouseenter',()=>{hoveredId=id;refresh();}); b.addEventListener('mouseleave',()=>{hoveredId=null;refresh();}); }
  return b; }
async function onItemClick(id){ const L=layerByKey[ALL[id].layer];
  if(!L.visible){ if(!L.loaded){ showToast(`Chargement : ${L.label}…`); try{await ensureLayer(L);}catch{} hideToast(); }
    L.visible=true; if(L.group)L.group.visible=true; layerBtns[L.key].classList.add('on'); applyFilter(); }
  select(id); focusId(id); if(MOBILE) listEl.classList.remove('open'); }
function buildList(filter=''){
  const f=(filter||'').trim().toLowerCase(); listItems.innerHTML='';
  if(f){ // recherche GLOBALE (tous systèmes, même non chargés)
    let n=0; const matches=[];
    for(const id in ALL){ const m=ALL[id]; if(m.fr.toLowerCase().includes(f)||m.la.toLowerCase().includes(f)){ matches.push(id); if(matches.length>CAP+1) break; } }
    if(!matches.length){ listItems.innerHTML=`<div class="more">Aucun résultat</div>`; return; }
    const byL={}; for(const id of matches.slice(0,CAP)){ (byL[ALL[id].layer]=byL[ALL[id].layer]||[]).push(id); }
    for(const L of LAYERS){ if(!byL[L.key]) continue; const h=document.createElement('div'); h.className='lyr-h'; h.innerHTML=`<span class="t">${L.label}</span>`; listItems.appendChild(h);
      for(const id of byL[L.key]) listItems.appendChild(mkItem(id)); }
    if(matches.length>CAP) listItems.appendChild(Object.assign(document.createElement('div'),{className:'more',textContent:`… affine la recherche (plus de ${CAP} résultats)`}));
    return;
  }
  // liste normale : systèmes visibles, groupés par région
  let any=false;
  for(const L of LAYERS){ if(!L.visible||!L.loaded) continue;
    const ids=Object.keys(ALL).filter(id=>ALL[id].layer===L.key && meshesById[id] && (!activeRegion||ALL[id].reg===activeRegion));
    if(!ids.length) continue; any=true;
    const h=document.createElement('div'); h.className='lyr-h';
    h.innerHTML=`<span class="t">${L.label}</span>`;
    const sl=document.createElement('input'); sl.type='range'; sl.min=15; sl.max=100; sl.value=Math.round(L.opacity*100); sl.title='Opacité';
    sl.addEventListener('input',()=>{ L.opacity=sl.value/100; refresh(); }); h.appendChild(sl);
    listItems.appendChild(h);
    let shown=0;
    for(const r of REGORDER){ const rids=ids.filter(id=>ALL[id].reg===r); if(!rids.length) continue;
      const rh=document.createElement('div'); rh.className='reg-h'; rh.textContent=r; listItems.appendChild(rh);
      for(const id of rids){ if(shown>=CAP){ break; } listItems.appendChild(mkItem(id)); shown++; }
      if(shown>=CAP) break;
    }
    if(ids.length>CAP) listItems.appendChild(Object.assign(document.createElement('div'),{className:'more',textContent:`… ${ids.length-CAP} autres (filtre région ou recherche)`}));
  }
  if(!any) listItems.innerHTML=`<div class="more">Active un système en haut pour lister ses structures.</div>`;
}
function markList(id){ document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('active',b.dataset.id===id)); }
document.getElementById('search').addEventListener('input',(e)=>buildList(e.target.value));
document.getElementById('list-toggle').addEventListener('click',()=>listEl.classList.toggle('open'));
document.getElementById('list-close').addEventListener('click',()=>listEl.classList.remove('open'));
document.getElementById('info-close').addEventListener('click',()=>{ infoEl.classList.remove('open'); select(null); });

/* ---- toast ---- */
const toastEl=document.getElementById('toast');
function showToast(m){ toastEl.textContent=m; toastEl.classList.add('show'); }
function hideToast(){ toastEl.classList.remove('show'); }

/* ---- contrôles ---- */
let autoRotate=false; const bRot=document.getElementById('btn-rotate');
bRot.addEventListener('click',()=>{autoRotate=!autoRotate;controls.autoRotate=autoRotate;controls.autoRotateSpeed=1.2;bRot.classList.toggle('on',autoRotate);});
function setView(w){ const t=controls.target, d=MOBILE?10:9;
  if(w==='front') camera.position.set(0,t.y,d); else if(w==='back') camera.position.set(0,t.y,-d); else camera.position.set(d*0.42,t.y+1.4,d*0.92);
  controls.update(); }
document.getElementById('btn-front').addEventListener('click',()=>setView('front'));
document.getElementById('btn-back').addEventListener('click',()=>setView('back'));
document.getElementById('btn-reset').addEventListener('click',()=>{ fly=null; setView('reset'); });
document.getElementById('btn-focus').addEventListener('click',()=>{ if(selectedId) focusId(selectedId); else showToast('Touche d’abord une structure'); setTimeout(hideToast,1400); });

/* ---- boucle ---- */
function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);
  if(composer){composer.setSize(innerWidth,innerHeight); outline.setSize(innerWidth,innerHeight);} }
addEventListener('resize',resize); addEventListener('orientationchange',()=>setTimeout(resize,300));
function animate(){ requestAnimationFrame(animate);
  if(fly){ const e=Math.min(1,(performance.now()-fly.t0)/fly.dur); const k=e<.5?2*e*e:1-Math.pow(-2*e+2,2)/2; // easeInOut
    camera.position.lerpVectors(fly.fromP,fly.toP,k); controls.target.lerpVectors(fly.fromT,fly.toT,k); if(e>=1) fly=null; }
  controls.update(); renderFrame(); }

/* ---- init ---- */
await ensureLayer(LAYERS[0]);
applyFilter();
controls.target.set(0, modelH*0.52, 0); setView('reset');
buildList();
const l=document.getElementById('loading'); if(l){ l.style.transition='opacity .45s'; l.style.opacity='0'; setTimeout(()=>l.remove(),480); }
animate();

} catch(err){ fail((err&&err.message)?err.message:String(err)); console.error(err); }
</script>
</body>
</html>
